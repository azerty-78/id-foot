name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  IMAGE_NAME: id-foot
  TRUFFLEHOG_VERSION: "3.95.3"

# develop : CI + build Docker local (pas de push/deploy).
# main/master + tags semver : push image, signature, déploiement VPS, smoke test.

jobs:
  tag:
    name: Compute version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      docker_tag: ${{ steps.compute.outputs.docker_tag }}
      short_sha: ${{ steps.compute.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and docker tag
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            VERSION="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          else
            BRANCH="${GITHUB_REF_NAME//\//-}"
            VERSION="${BRANCH}-${SHORT_SHA}"
          fi

          DOCKER_TAG="$(echo "${VERSION}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9._-' '-' | sed 's/^[.-]*//' | cut -c1-128)"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          {
            echo "### Version"
            echo "- Version: \`${VERSION}\`"
            echo "- Docker tag: \`${DOCKER_TAG}\`"
            echo "- Short SHA: \`${SHORT_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  lint-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript
        run: npm run typecheck

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (skipped if no test script defined)
        run: npm test --if-present

  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (PR diff scan)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Install TruffleHog (push / tag)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          ver="${TRUFFLEHOG_VERSION}"
          asset="trufflehog_${ver}_linux_amd64.tar.gz"
          url="https://github.com/trufflesecurity/trufflehog/releases/download/v${ver}/${asset}"
          tmp="$(mktemp -d)"
          curl -sSfL "$url" -o "${tmp}/${asset}"
          tar -xzf "${tmp}/${asset}" -C "${tmp}"
          sudo install -m 0755 "${tmp}/trufflehog" /usr/local/bin/trufflehog
          rm -rf "${tmp}"
          trufflehog --version

      - name: TruffleHog (filesystem scan on push / tag)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          trufflehog filesystem . \
            --only-verified \
            --fail \
            --no-update \
            --exclude-paths=.github/trufflehog-exclude-paths.txt

  dependency-audit:
    name: npm audit
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Run npm audit (fail on critical)
        run: npm audit --audit-level=critical --omit=dev

  build:
    name: Build Next.js application
    runs-on: ubuntu-latest
    needs:
      - tag
      - lint-typecheck
      - unit-tests
      - secret-scan
      - dependency-audit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          NEXTAUTH_SECRET: ci-build-secret-not-for-production
          NEXTAUTH_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}

  docker-build:
    name: Build and scan Docker image
    runs-on: ubuntu-latest
    needs: [tag, build]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (load locally)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: setup/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.short_sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (report only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

      - name: Image build summary
        shell: bash
        run: |
          {
            echo "### Docker image (built locally)"
            echo "- \`${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}\`"
            echo "- \`${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.short_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-push:
    name: Push image to Docker Hub and GHCR
    runs-on: ubuntu-latest
    needs: [tag, docker-build]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.docker_tag }}
            type=raw,value=${{ needs.tag.outputs.short_sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image (multi-registry)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: setup/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Push summary
        shell: bash
        run: |
          {
            echo "### Image pushed"
            echo "- Digest: \`${{ steps.push.outputs.digest }}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              [ -n "${tag}" ] && echo "  - \`${tag}\`"
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-sign:
    name: Sign image with cosign (keyless OIDC)
    runs-on: ubuntu-latest
    needs: [tag, docker-push]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Hub image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}@${{ needs.docker-push.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [tag, docker-push, docker-sign]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=()
          [ -z "${VPS_HOST}" ] && missing+=("VPS_HOST")
          [ -z "${VPS_USERNAME}" ] && missing+=("VPS_USERNAME")
          [ -z "${VPS_SSH_KEY}" ] && missing+=("VPS_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Secrets VPS manquants : ${missing[*]}"
            exit 1
          fi
          echo "Secrets VPS présents"

      - name: Copy compose.prod.yaml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "setup/compose.prod.yaml"
          target: "${{ secrets.VPS_DEPLOY_DIR || '~/id-foot' }}/"
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH (pull & restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FRONT_IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD,DEPLOY_DIR
          script: |
            set -eu

            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/id-foot}"
            cd "$DEPLOY_DIR"

            SUDO=""
            if [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "==> Docker absent : installation"
              curl -fsSL https://get.docker.com | $SUDO sh
              $SUDO usermod -aG docker "$USER" || true
            fi

            if ! $SUDO systemctl is-active --quiet docker; then
              echo "==> Démarrage du service Docker"
              $SUDO systemctl enable --now docker
            fi

            echo "==> Compose : $(docker compose version)"

            if [ ! -f "$DEPLOY_DIR/.env" ]; then
              echo "Fichier $DEPLOY_DIR/.env absent."
              echo "Créez-le à partir de setup/.env.example (DATABASE_URL, NEXTAUTH_*, POSTGRES_*)."
              exit 1
            fi

            if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_PASSWORD:-}" ]; then
              echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            fi

            export FRONT_IMAGE
            echo "==> Image cible : $FRONT_IMAGE"

            docker compose -f compose.prod.yaml pull app
            docker compose -f compose.prod.yaml up -d --remove-orphans --force-recreate
            docker image prune -f
            docker compose -f compose.prod.yaml ps

            docker logout || true
        env:
          FRONT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}

      - name: Deploy summary
        shell: bash
        run: |
          {
            echo "### Déploiement ID FOOT"
            echo "- Image : \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}\`"
            echo "- Digest : \`${{ needs.docker-push.outputs.digest }}\`"
            echo "- Hôte : \`${{ secrets.VPS_HOST }}\`"
            echo "- URL : ${{ vars.NEXT_PUBLIC_SITE_URL || '(configurer NEXT_PUBLIC_SITE_URL)' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-test:
    name: Smoke test post-deploy
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
    steps:
      - name: Healthcheck SSH (conteneur + HTTP local)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_DIR,APP_PORT
          script: |
            set -eu
            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/id-foot}"
            APP_PORT="${APP_PORT:-3000}"

            RUNNING="$(docker ps --filter 'name=^id-foot-app$' --format '{{.Names}}')"
            if [ "$RUNNING" != "id-foot-app" ]; then
              echo "Conteneur id-foot-app absent ou arrêté"
              docker ps -a
              exit 1
            fi

            RUNNING_DB="$(docker ps --filter 'name=^id-foot-db$' --format '{{.Names}}')"
            if [ "$RUNNING_DB" != "id-foot-db" ]; then
              echo "Conteneur id-foot-db absent ou arrêté"
              docker ps -a
              exit 1
            fi

            echo "Healthcheck app : $(docker inspect -f '{{.State.Health.Status}}' id-foot-app 2>/dev/null || echo none)"

            i=1
            while [ "$i" -le 18 ]; do
              HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://127.0.0.1:${APP_PORT}/" || echo 000)"
              if [ "$HTTP_CODE" != "000" ]; then
                echo "App OK (port $APP_PORT, HTTP $HTTP_CODE)"
                exit 0
              fi
              echo "App pas prête ($i/18)..."
              i=$((i+1))
              sleep 5
            done

            echo "App ne répond pas après 90s — derniers logs :"
            docker logs --tail 200 id-foot-app || true
            exit 1
        env:
          DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
          APP_PORT: ${{ vars.APP_PORT }}

      - name: Public HTTP check (optionnel)
        if: vars.NEXT_PUBLIC_SITE_URL != ''
        shell: bash
        env:
          PUBLIC_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: |
          set -euo pipefail
          echo "==> Probe publique : $PUBLIC_URL"
          for i in $(seq 1 6); do
            HTTP_CODE="$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 10 "$PUBLIC_URL/" || echo '000')"
            echo "Tentative $i : HTTP $HTTP_CODE"
            case "$HTTP_CODE" in
              2*|3*)
                echo "Public endpoint OK"
                exit 0
                ;;
            esac
            sleep 10
          done
          echo "::warning::Endpoint public non joignable depuis le runner. Vérifie DNS / firewall / reverse proxy."

      - name: Smoke test summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Smoke test ID FOOT"
            echo "- Conteneurs \`id-foot-app\` + \`id-foot-db\` vérifiés sur \`${{ secrets.VPS_HOST }}\`"
            echo "- Endpoint local : http://127.0.0.1:${{ vars.APP_PORT || '3000' }}/"
            echo "- Endpoint public : ${{ vars.NEXT_PUBLIC_SITE_URL || '(non configuré)' }}"
          } >> "$GITHUB_STEP_SUMMARY"
