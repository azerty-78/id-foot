name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  IMAGE_NAME: id-foot
  TRUFFLEHOG_VERSION: "3.95.3"
  APP_HOST_PORT: "4003"
  CONTAINER_NAME: id-foot-app
  DEFAULT_DEPLOY_DIR: /home/deploy/id-foot
  DEFAULT_PUBLIC_URL: https://id-foot.kobecorporation.com
  DEFAULT_DOCKER_REGISTRY: azerty78
  DEFAULT_VPS_SSH_PORT: "22"

# develop : CI + build Docker local (pas de push/deploy).
# main/master + tags semver : push image, signature, déploiement VPS (docker run), smoke test.

jobs:
  config:
    name: Resolve workflow configuration
    runs-on: ubuntu-latest
    outputs:
      public_url: ${{ steps.resolve.outputs.public_url }}
      deploy_dir: ${{ steps.resolve.outputs.deploy_dir }}
      vps_port: ${{ steps.resolve.outputs.vps_port }}
      public_check_enabled: ${{ steps.resolve.outputs.public_check_enabled }}
      docker_registry: ${{ steps.resolve.outputs.docker_registry }}
    steps:
      - name: Resolve URLs, paths and registry
        id: resolve
        env:
          VAR_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          SECRET_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
          SECRET_VPS_PORT: ${{ secrets.VPS_PORT }}
          DEFAULT_PUBLIC_URL: ${{ env.DEFAULT_PUBLIC_URL }}
          DEFAULT_DEPLOY_DIR: ${{ env.DEFAULT_DEPLOY_DIR }}
          DEFAULT_VPS_SSH_PORT: ${{ env.DEFAULT_VPS_SSH_PORT }}
          DEFAULT_DOCKER_REGISTRY: ${{ env.DEFAULT_DOCKER_REGISTRY }}
        run: |
          set -euo pipefail

          if [ -n "${VAR_PUBLIC_URL}" ]; then
            echo "public_url=${VAR_PUBLIC_URL}" >> "$GITHUB_OUTPUT"
            echo "public_check_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "public_url=${DEFAULT_PUBLIC_URL}" >> "$GITHUB_OUTPUT"
            echo "public_check_enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "deploy_dir=${SECRET_DEPLOY_DIR:-${DEFAULT_DEPLOY_DIR}}" >> "$GITHUB_OUTPUT"
          echo "vps_port=${SECRET_VPS_PORT:-${DEFAULT_VPS_SSH_PORT}}" >> "$GITHUB_OUTPUT"
          # Fallback public uniquement — ne jamais y mettre un secret (outputs inter-jobs vidés par GitHub).
          echo "docker_registry=${DEFAULT_DOCKER_REGISTRY}" >> "$GITHUB_OUTPUT"

  tag:
    name: Compute version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      docker_tag: ${{ steps.compute.outputs.docker_tag }}
      short_sha: ${{ steps.compute.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and docker tag
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            VERSION="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          else
            BRANCH="${GITHUB_REF_NAME//\//-}"
            VERSION="${BRANCH}-${SHORT_SHA}"
          fi

          DOCKER_TAG="$(echo "${VERSION}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9._-' '-' | sed 's/^[.-]*//' | cut -c1-128)"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          {
            echo "### Version"
            echo "- Version: \`${VERSION}\`"
            echo "- Docker tag: \`${DOCKER_TAG}\`"
            echo "- Short SHA: \`${SHORT_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  lint-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript
        run: npm run typecheck

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (skipped if no test script defined)
        run: npm test --if-present

  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (PR diff scan)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Install TruffleHog (push / tag)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          ver="${TRUFFLEHOG_VERSION}"
          asset="trufflehog_${ver}_linux_amd64.tar.gz"
          url="https://github.com/trufflesecurity/trufflehog/releases/download/v${ver}/${asset}"
          tmp="$(mktemp -d)"
          curl -sSfL "$url" -o "${tmp}/${asset}"
          tar -xzf "${tmp}/${asset}" -C "${tmp}"
          sudo install -m 0755 "${tmp}/trufflehog" /usr/local/bin/trufflehog
          rm -rf "${tmp}"
          trufflehog --version

      - name: TruffleHog (filesystem scan on push / tag)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          trufflehog filesystem . \
            --only-verified \
            --fail \
            --no-update \
            --exclude-paths=.github/trufflehog-exclude-paths.txt

  dependency-audit:
    name: npm audit
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Run npm audit (fail on critical)
        run: npm audit --audit-level=critical --omit=dev

  build:
    name: Build Next.js application
    runs-on: ubuntu-latest
    needs:
      - config
      - tag
      - lint-typecheck
      - unit-tests
      - secret-scan
      - dependency-audit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          NEXTAUTH_SECRET: ci-build-secret-not-for-production
          NEXTAUTH_URL: ${{ needs.config.outputs.public_url }}
          NEXT_PUBLIC_APP_URL: ${{ needs.config.outputs.public_url }}
          GOD_MODE_EMAIL: ci-god@example.com
          GOD_MODE_PASSWORD: ci-god-password
          GOD_MODE_NAME: God Mod CI
          GOD_MODE_SESSION_SECRET: ci-god-mode-secret-not-for-production

  docker-build:
    name: Build and scan Docker image
    runs-on: ubuntu-latest
    needs: [config, tag, build]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare .dockerignore (source setup/)
        run: cp setup/.dockerignore .dockerignore

      - name: Build Docker image (load locally)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: setup/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.short_sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ needs.config.outputs.public_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (report only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

      - name: Image build summary
        shell: bash
        run: |
          {
            echo "### Docker image (built locally)"
            echo "- \`${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}\`"
            echo "- \`${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.short_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-push:
    name: Push image to Docker Hub and GHCR
    runs-on: ubuntu-latest
    needs: [config, tag, docker-build]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare .dockerignore (source setup/)
        run: cp setup/.dockerignore .dockerignore

      - name: Resolve Docker Hub namespace
        id: docker_hub
        shell: bash
        env:
          DEFAULT_DOCKER_REGISTRY: ${{ env.DEFAULT_DOCKER_REGISTRY }}
        run: |
          set -euo pipefail
          NS="${DOCKERHUB_USERNAME:-${DOCKER_USERNAME:-${DEFAULT_DOCKER_REGISTRY}}}"
          if [ -z "${NS}" ]; then
            echo "::error::Secret DOCKERHUB_USERNAME ou DOCKER_USERNAME requis"
            exit 1
          fi
          echo "namespace=${NS}" >> "$GITHUB_OUTPUT"
          echo "Docker Hub namespace résolu (longueur: ${#NS})"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.docker_hub.outputs.namespace }}
          password: ${{ secrets.DOCKERHUB_PASSWORD || secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.docker_hub.outputs.namespace }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.docker_tag }}
            type=raw,value=${{ needs.tag.outputs.short_sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image (multi-registry)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: setup/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ needs.config.outputs.public_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Push summary
        shell: bash
        run: |
          {
            echo "### Image pushed"
            echo "- Digest: \`${{ steps.push.outputs.digest }}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              [ -n "${tag}" ] && echo "  - \`${tag}\`"
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-sign:
    name: Sign image with cosign (keyless OIDC)
    runs-on: ubuntu-latest
    needs: [config, tag, docker-push]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Resolve Docker Hub namespace
        id: docker_hub
        shell: bash
        env:
          DEFAULT_DOCKER_REGISTRY: ${{ env.DEFAULT_DOCKER_REGISTRY }}
        run: |
          set -euo pipefail
          NS="${DOCKERHUB_USERNAME:-${DOCKER_USERNAME:-${DEFAULT_DOCKER_REGISTRY}}}"
          if [ -z "${NS}" ]; then
            echo "::error::Secret DOCKERHUB_USERNAME ou DOCKER_USERNAME requis"
            exit 1
          fi
          echo "namespace=${NS}" >> "$GITHUB_OUTPUT"
          echo "Docker Hub namespace résolu (longueur: ${#NS})"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.docker_hub.outputs.namespace }}
          password: ${{ secrets.DOCKERHUB_PASSWORD || secrets.DOCKER_PASSWORD }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Hub image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ steps.docker_hub.outputs.namespace }}/${{ env.IMAGE_NAME }}@${{ needs.docker-push.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [config, tag, docker-push, docker-sign]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          missing=()
          [ -z "${VPS_HOST}" ] && missing+=("VPS_HOST")
          [ -z "${VPS_SSH_KEY}" ] && missing+=("VPS_SSH_KEY")
          if [ -z "${VPS_USERNAME}" ] && [ -z "${VPS_USER}" ]; then
            missing+=("VPS_USERNAME ou VPS_USER")
          fi
          if [ -z "${DOCKERHUB_USERNAME}" ] && [ -z "${DOCKER_USERNAME}" ]; then
            missing+=("DOCKERHUB_USERNAME ou DOCKER_USERNAME")
          fi
          if [ -z "${DOCKERHUB_PASSWORD}" ] && [ -z "${DOCKER_PASSWORD}" ]; then
            missing+=("DOCKERHUB_PASSWORD ou DOCKER_PASSWORD")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Secrets manquants : ${missing[*]}"
            exit 1
          fi
          echo "Secrets VPS et Docker Hub présents"

      - name: Resolve SSH username
        id: ssh
        shell: bash
        run: |
          if [ -n "${VPS_USERNAME}" ]; then
            echo "username=${VPS_USERNAME}" >> "$GITHUB_OUTPUT"
          else
            echo "username=${VPS_USER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Docker Hub namespace
        id: docker_hub
        shell: bash
        env:
          DEFAULT_DOCKER_REGISTRY: ${{ env.DEFAULT_DOCKER_REGISTRY }}
        run: |
          set -euo pipefail
          NS="${DOCKERHUB_USERNAME:-${DOCKER_USERNAME:-${DEFAULT_DOCKER_REGISTRY}}}"
          if [ -z "${NS}" ]; then
            echo "::error::Secret DOCKERHUB_USERNAME ou DOCKER_USERNAME requis"
            exit 1
          fi
          echo "namespace=${NS}" >> "$GITHUB_OUTPUT"
          echo "Docker Hub namespace résolu (longueur: ${#NS})"

      - name: Deploy via SSH (docker run)
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ steps.docker_hub.outputs.namespace }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          APP_HOST_PORT: ${{ env.APP_HOST_PORT }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          DEPLOY_DIR: ${{ needs.config.outputs.deploy_dir }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ needs.config.outputs.vps_port }}
          username: ${{ steps.ssh.outputs.username }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,DOCKERHUB_USERNAME,DOCKER_USERNAME,DOCKERHUB_PASSWORD,DOCKER_PASSWORD,APP_HOST_PORT,CONTAINER_NAME,DEPLOY_DIR
          script: |
            set -eu

            DOCKER_USER="${DOCKERHUB_USERNAME:-${DOCKER_USERNAME:-}}"
            DOCKER_PASS="${DOCKERHUB_PASSWORD:-${DOCKER_PASSWORD:-}}"

            SUDO=""
            if [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "==> Docker absent : installation"
              curl -fsSL https://get.docker.com | $SUDO sh
              $SUDO usermod -aG docker "$USER" || true
            fi

            if ! $SUDO systemctl is-active --quiet docker; then
              echo "==> Démarrage du service Docker"
              $SUDO systemctl enable --now docker
            fi

            docker network create id-foot-network 2>/dev/null || true

            if [ ! -f "$DEPLOY_DIR/.env" ]; then
              echo "ERREUR : $DEPLOY_DIR/.env introuvable."
              echo "Créez-le à partir de setup/.env.example (DATABASE_URL, NEXTAUTH_*, etc.)."
              exit 1
            fi

            echo "==> Connexion Docker Hub"
            echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin

            echo "==> Pull image : $IMAGE"
            docker pull "$IMAGE"

            echo "==> Arrêt de l'ancien conteneur (si existant)"
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            echo "==> Démarrage du nouveau conteneur"
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --network id-foot-network \
              -p "127.0.0.1:${APP_HOST_PORT}:3000" \
              --env-file "$DEPLOY_DIR/.env" \
              -v id-foot-uploads:/usr/src/app/public/uploads \
              "$IMAGE"

            echo "==> Nettoyage"
            docker image prune -f
            docker logout || true

            echo "==> État du conteneur"
            docker ps --filter "name=^${CONTAINER_NAME}$"

            echo "==> Healthcheck local (port ${APP_HOST_PORT})"
            for i in $(seq 1 18); do
              HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://127.0.0.1:${APP_HOST_PORT}/" || echo 000)"
              if [ "$HTTP_CODE" != "000" ]; then
                echo "App OK — HTTP $HTTP_CODE"
                exit 0
              fi
              echo "En attente ($i/18)..."
              sleep 5
            done

            echo "App ne répond pas — logs :"
            docker logs --tail 100 "$CONTAINER_NAME" || true
            exit 1

      - name: Deploy summary
        shell: bash
        run: |
          {
            echo "### Déploiement ID FOOT"
            echo "- Image : \`${{ steps.docker_hub.outputs.namespace }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}\`"
            echo "- Digest : \`${{ needs.docker-push.outputs.digest }}\`"
            echo "- Hôte : \`${{ secrets.VPS_HOST }}\`"
            echo "- Port local : \`${{ env.APP_HOST_PORT }}\`"
            echo "- URL : ${{ needs.config.outputs.public_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-test:
    name: Smoke test post-deploy
    runs-on: ubuntu-latest
    needs: [config, deploy]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
    env:
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - name: Resolve SSH username
        id: ssh
        shell: bash
        run: |
          if [ -n "${VPS_USERNAME}" ]; then
            echo "username=${VPS_USERNAME}" >> "$GITHUB_OUTPUT"
          else
            echo "username=${VPS_USER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Healthcheck SSH (conteneur + HTTP local)
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_HOST_PORT: ${{ env.APP_HOST_PORT }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ needs.config.outputs.vps_port }}
          username: ${{ steps.ssh.outputs.username }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_HOST_PORT,CONTAINER_NAME
          script: |
            set -eu
            APP_PORT="${APP_HOST_PORT:-4003}"
            CONTAINER="${CONTAINER_NAME:-id-foot-app}"

            RUNNING="$(docker ps --filter "name=^${CONTAINER}$" --format '{{.Names}}')"
            if [ "$RUNNING" != "$CONTAINER" ]; then
              echo "Conteneur $CONTAINER absent ou arrêté"
              docker ps -a
              exit 1
            fi

            RUNNING_DB="$(docker ps --filter 'name=^id-foot-db$' --format '{{.Names}}')"
            if [ "$RUNNING_DB" != "id-foot-db" ]; then
              echo "Conteneur id-foot-db absent ou arrêté"
              docker ps -a
              exit 1
            fi

            echo "Healthcheck app : $(docker inspect -f '{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo none)"

            i=1
            while [ "$i" -le 18 ]; do
              HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://127.0.0.1:${APP_PORT}/" || echo 000)"
              if [ "$HTTP_CODE" != "000" ]; then
                echo "App OK (port $APP_PORT, HTTP $HTTP_CODE)"
                exit 0
              fi
              echo "App pas prête ($i/18)..."
              i=$((i+1))
              sleep 5
            done

            echo "App ne répond pas après 90s — derniers logs :"
            docker logs --tail 200 "$CONTAINER" || true
            exit 1

      - name: Public HTTP check (optionnel)
        if: needs.config.outputs.public_check_enabled == 'true'
        shell: bash
        env:
          PUBLIC_URL: ${{ needs.config.outputs.public_url }}
        run: |
          set -euo pipefail
          echo "==> Probe publique : $PUBLIC_URL"
          for i in $(seq 1 6); do
            HTTP_CODE="$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 10 "$PUBLIC_URL/" || echo '000')"
            echo "Tentative $i : HTTP $HTTP_CODE"
            case "$HTTP_CODE" in
              2*|3*)
                echo "Public endpoint OK"
                exit 0
                ;;
            esac
            sleep 10
          done
          echo "::warning::Endpoint public non joignable depuis le runner. Vérifie DNS / firewall / reverse proxy."

      - name: Smoke test summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Smoke test ID FOOT"
            echo "- Conteneurs \`id-foot-app\` + \`id-foot-db\` vérifiés sur \`${{ secrets.VPS_HOST }}\`"
            echo "- Endpoint local : http://127.0.0.1:${{ env.APP_HOST_PORT }}/"
            echo "- Endpoint public : ${{ needs.config.outputs.public_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
